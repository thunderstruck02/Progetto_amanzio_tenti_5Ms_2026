<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>D&D Monster Sheet</title>
  <style>
    :root{
      --bg:#0b0f14;
      --panel:#111826;
      --panel2:#0f172a;
      --text:#e5e7eb;
      --muted:#9ca3af;
      --line:#233047;
      --accent:#7dd3fc;
      --chip:#172554;
      --good:#86efac;
      --bad:#fca5a5;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background: radial-gradient(1200px 700px at 20% -10%, #1d4ed8 0%, transparent 55%),
                  radial-gradient(900px 600px at 90% 10%, #0ea5e9 0%, transparent 55%),
                  var(--bg);
      color:var(--text);
      line-height:1.45;
    }
    a{ color: var(--accent); text-decoration:none; }
    a:hover{ text-decoration:underline; }

    .wrap{ max-width:1100px; margin:0 auto; padding:24px; }
    header{
      display:flex; align-items:flex-end; justify-content:space-between;
      gap:16px; padding:18px 18px 10px;
      border:1px solid var(--line); border-radius:18px;
      background: linear-gradient(180deg, rgba(17,24,38,.95), rgba(15,23,42,.85));
      backdrop-filter: blur(6px);
    }
    .title h1{ margin:0; font-size:32px; letter-spacing:.2px; }
    .subtitle{ margin-top:6px; color:var(--muted); }
    .pillrow{ display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
    .pill{
      font-size:12px; padding:6px 10px; border-radius:999px;
      background: rgba(125,211,252,.12);
      border:1px solid rgba(125,211,252,.25);
      color:#dbeafe;
      white-space:nowrap;
    }
    .meta{
      display:flex; flex-direction:column; gap:10px; align-items:flex-end;
      min-width:240px;
    }
    .kv{
      display:grid; grid-template-columns: auto auto; gap:6px 12px;
      font-size:13px; color:var(--muted);
    }
    .kv b{ color:var(--text); font-weight:600; }
    .btnbar{ display:flex; gap:10px; }
    button{
      cursor:pointer;
      border-radius:12px;
      border:1px solid var(--line);
      background: rgba(125,211,252,.10);
      color: var(--text);
      padding:9px 12px;
      font-weight:600;
    }
    button:hover{ background: rgba(125,211,252,.16); }

    main{
      margin-top:18px;
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap:18px;
    }
    @media (max-width: 900px){
      header{ flex-direction:column; align-items:flex-start; }
      .meta{ align-items:flex-start; min-width:auto; }
      main{ grid-template-columns: 1fr; }
    }

    .card{
      border:1px solid var(--line);
      background: rgba(15,23,42,.85);
      border-radius:18px;
      padding:16px;
    }
    .card h2{
      margin:0 0 10px;
      font-size:18px;
      letter-spacing:.2px;
    }
    .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .statgrid{
      display:grid;
      grid-template-columns: repeat(6, 1fr);
      gap:10px;
    }
    @media (max-width: 900px){
      .statgrid{ grid-template-columns: repeat(3, 1fr); }
    }
    .stat{
      border:1px solid var(--line);
      border-radius:16px;
      padding:10px;
      background: rgba(17,24,38,.55);
      text-align:center;
    }
    .stat .k{ color:var(--muted); font-size:12px; letter-spacing:.6px; }
    .stat .v{ font-size:18px; font-weight:800; margin-top:4px; }
    .stat .m{ color:var(--muted); font-size:12px; margin-top:2px; }

    .row{
      display:flex; justify-content:space-between; gap:10px;
      padding:10px 0;
      border-top:1px solid rgba(35,48,71,.65);
    }
    .row:first-child{ border-top:none; padding-top:0; }
    .row .k{ color:var(--muted); }
    .row .v{ text-align:right; }

    .tags{
      display:flex; flex-wrap:wrap; gap:8px;
    }
    .tag{
      font-size:12px;
      padding:6px 10px;
      border-radius:12px;
      background: rgba(23,37,84,.55);
      border:1px solid rgba(35,48,71,.9);
      color:#dbeafe;
    }

    details{
      border:1px solid var(--line);
      border-radius:16px;
      padding:10px 12px;
      background: rgba(17,24,38,.50);
      margin-top:10px;
    }
    details summary{
      cursor:pointer;
      font-weight:700;
      display:flex; align-items:center; justify-content:space-between;
      gap:10px;
      list-style:none;
    }
    details summary::-webkit-details-marker{ display:none; }
    .desc{ color:var(--text); margin-top:8px; }
    .small{ color:var(--muted); font-size:12px; margin-top:6px; }

    .monster-img{
      width: 100%;
      max-width: 320px;     /* limita la larghezza */
      max-height: 260px;    /* limita l’altezza */
      margin: 0 auto;       /* centra l’immagine */
      display: block;
      object-fit: contain;
      border-radius:16px;
      border:1px solid var(--line);
      background: rgba(0,0,0,.25);
    }

    .muted{ color:var(--muted); }
    .splitline{ height:1px; background: rgba(35,48,71,.65); margin:12px 0; }

    .codebox{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:12px;
      background: rgba(0,0,0,.25);
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px;
      overflow:auto;
      white-space:pre;
      color:#cbd5e1;
    }
  </style>
</head>
<body>
<!-- Barra di navigazione -->
<div class="navbar">
    <a href="{{ url_for('home') }}">
        <button class="nav-button">🏠 Home</button>
    </a>

    <a href="{{ url_for('mostri') }}">
        <button class="nav-button">👹 Mostri</button>
    </a>

    <a href="{{ url_for('pagina_mostro', index='aboleth') }}">
        <button class="nav-button">📖 Scheda Mostro</button>
    </a>

    <a href="{{ url_for('oggetti') }}">
        <button class="nav-button">🗡️ Oggetti</button>
    </a>

    <a href="{{ url_for('incantesimi') }}">
        <button class="nav-button">🪄 Incantesimi</button>
    </a>

    <a href="{{ url_for('new_5e') }}">
        <button class="nav-button">📜 Nuove aggiunte 5e</button>
    </a>
</div>
  <div class="wrap">
    <header>
      <div class="title">
        <h1 id="monsterName">Monster</h1>
        <div class="subtitle" id="monsterTypeLine"></div>
        <div class="pillrow" id="pillRow"></div>
      </div>

      <div class="meta">
        <div class="kv">
          <div>CR</div><b id="cr"></b>
          <div>XP</div><b id="xp"></b>
          <div>Proficiency</div><b id="pb"></b>
          <div>Aggiornato</div><b id="updated"></b>
        </div>
        <div class="btnbar">
          <button id="copyJsonBtn">Copia JSON</button>
          <button id="openApiBtn">Apri API</button>
        </div>
      </div>
    </header>

    <main>
      <!-- LEFT -->
      <section class="card">
        <h2>Statistiche</h2>

        <div class="grid2">
          <div>
            <div class="row">
              <div class="k">Classe Armatura</div>
              <div class="v" id="ac"></div>
            </div>
            <div class="row">
              <div class="k">Punti Ferita</div>
              <div class="v" id="hp"></div>
            </div>
            <div class="row">
              <div class="k">Dadi Vita</div>
              <div class="v" id="hd"></div>
            </div>
            <div class="row">
              <div class="k">Velocità</div>
              <div class="v" id="speed"></div>
            </div>
          </div>

          <div>
            <div class="row">
              <div class="k">Sensi</div>
              <div class="v" id="senses"></div>
            </div>
            <div class="row">
              <div class="k">Linguaggi</div>
              <div class="v" id="languages"></div>
            </div>
            <div class="row">
              <div class="k">Allineamento</div>
              <div class="v" id="alignment"></div>
            </div>
            <div class="row">
              <div class="k">Tag</div>
              <div class="v" id="tagsInline"></div>
            </div>
          </div>
        </div>

        <div class="splitline"></div>

        <div class="statgrid" id="abilityGrid"></div>

        <div class="splitline"></div>

        <h2>Competenze</h2>
        <div class="tags" id="profs"></div>

        <div class="splitline"></div>

        <h2>Difese</h2>
        <div class="grid2">
          <div>
            <div class="row">
              <div class="k">Vulnerabilità</div>
              <div class="v" id="vuln"></div>
            </div>
            <div class="row">
              <div class="k">Resistenze</div>
              <div class="v" id="res"></div>
            </div>
          </div>
          <div>
            <div class="row">
              <div class="k">Immunità danni</div>
              <div class="v" id="imm"></div>
            </div>
            <div class="row">
              <div class="k">Immunità condizioni</div>
              <div class="v" id="cimm"></div>
            </div>
          </div>
        </div>

        <div class="splitline"></div>

        <h2>Tratti speciali</h2>
        <div id="specials"></div>

        <div class="splitline"></div>

        <h2>Azioni</h2>
        <div id="actions"></div>

        <div class="splitline"></div>

        <h2>Azioni leggendarie</h2>
        <div id="legendary"></div>
      </section>

      <!-- RIGHT -->
      <aside class="card">
        <h2>Immagine</h2>
        <img id="monsterImg" class="monster-img" alt="Monster image" />

        <div class="splitline"></div>

      </aside>
    </main>
  </div>

  <script>
    // === INCOLLA QUI IL TUO JSON ===
    const monster = {
      "index":"aboleth",
      "name":"Aboleth",
      "size":"Large",
      "type":"aberration",
      "alignment":"lawful evil",
      "armor_class":[{"type":"natural","value":17}],
      "hit_points":135,
      "hit_dice":"18d10",
      "hit_points_roll":"18d10+36",
      "speed":{"walk":"10 ft.","swim":"40 ft."},
      "strength":21,
      "dexterity":9,
      "constitution":15,
      "intelligence":18,
      "wisdom":15,
      "charisma":18,
      "proficiencies":[
        {"value":6,"proficiency":{"index":"saving-throw-con","name":"Saving Throw: CON","url":"/api/2014/proficiencies/saving-throw-con"}},
        {"value":8,"proficiency":{"index":"saving-throw-int","name":"Saving Throw: INT","url":"/api/2014/proficiencies/saving-throw-int"}},
        {"value":6,"proficiency":{"index":"saving-throw-wis","name":"Saving Throw: WIS","url":"/api/2014/proficiencies/saving-throw-wis"}},
        {"value":12,"proficiency":{"index":"skill-history","name":"Skill: History","url":"/api/2014/proficiencies/skill-history"}},
        {"value":10,"proficiency":{"index":"skill-perception","name":"Skill: Perception","url":"/api/2014/proficiencies/skill-perception"}}
      ],
      "damage_vulnerabilities":[],
      "damage_resistances":[],
      "damage_immunities":[],
      "condition_immunities":[],
      "senses":{"darkvision":"120 ft.","passive_perception":20},
      "languages":"Deep Speech, telepathy 120 ft.",
      "challenge_rating":10,
      "proficiency_bonus":4,
      "xp":5900,
      "special_abilities":[
        {"name":"Amphibious","desc":"The aboleth can breathe air and water.","damage":[]},
        {"name":"Mucous Cloud","desc":"While underwater, the aboleth is surrounded by transformative mucus. A creature that touches the aboleth or that hits it with a melee attack while within 5 ft. of it must make a DC 14 Constitution saving throw. On a failure, the creature is diseased for 1d4 hours. The diseased creature can breathe only underwater.","dc":{"dc_type":{"index":"con","name":"CON","url":"/api/2014/ability-scores/con"},"dc_value":14,"success_type":"none"},"damage":[]},
        {"name":"Probing Telepathy","desc":"If a creature communicates telepathically with the aboleth, the aboleth learns the creature's greatest desires if the aboleth can see the creature.","damage":[]}
      ],
      "actions":[
        {"damage":[],"name":"Multiattack","multiattack_type":"actions","desc":"The aboleth makes three tentacle attacks.","actions":[{"action_name":"Tentacle","count":"3","type":"melee"}]},
        {"name":"Tentacle","desc":"Melee Weapon Attack: +9 to hit, reach 10 ft., one target. Hit: 12 (2d6 + 5) bludgeoning damage. If the target is a creature, it must succeed on a DC 14 Constitution saving throw or become diseased. The disease has no effect for 1 minute and can be removed by any magic that cures disease. After 1 minute, the diseased creature's skin becomes translucent and slimy, the creature can't regain hit points unless it is underwater, and the disease can be removed only by heal or another disease-curing spell of 6th level or higher. When the creature is outside a body of water, it takes 6 (1d12) acid damage every 10 minutes unless moisture is applied to the skin before 10 minutes have passed.","attack_bonus":9,"dc":{"dc_type":{"index":"con","name":"CON","url":"/api/2014/ability-scores/con"},"dc_value":14,"success_type":"none"},"damage":[{"damage_type":{"index":"bludgeoning","name":"Bludgeoning","url":"/api/2014/damage-types/bludgeoning"},"damage_dice":"2d6+5"},{"damage_type":{"index":"acid","name":"Acid","url":"/api/2014/damage-types/acid"},"damage_dice":"1d12"}],"actions":[]},
        {"name":"Tail","desc":"Melee Weapon Attack: +9 to hit, reach 10 ft., one target. Hit: 15 (3d6 + 5) bludgeoning damage.","attack_bonus":9,"damage":[{"damage_type":{"index":"bludgeoning","name":"Bludgeoning","url":"/api/2014/damage-types/bludgeoning"},"damage_dice":"3d6+5"}],"actions":[]},
        {"damage":[],"name":"Enslave","desc":"The aboleth targets one creature it can see within 30 ft. of it. The target must succeed on a DC 14 Wisdom saving throw or be magically charmed by the aboleth until the aboleth dies or until it is on a different plane of existence from the target. The charmed target is under the aboleth's control and can't take reactions, and the aboleth and the target can communicate telepathically with each other over any distance.\\nWhenever the charmed target takes damage, the target can repeat the saving throw. On a success, the effect ends. No more than once every 24 hours, the target can also repeat the saving throw when it is at least 1 mile away from the aboleth.","usage":{"type":"per day","times":3},"dc":{"dc_type":{"index":"wis","name":"WIS","url":"/api/2014/ability-scores/wis"},"dc_value":14,"success_type":"none"},"actions":[]}
      ],
      "legendary_actions":[
        {"name":"Detect","desc":"The aboleth makes a Wisdom (Perception) check.","damage":[]},
        {"name":"Tail Swipe","desc":"The aboleth makes one tail attack.","damage":[]},
        {"name":"Psychic Drain (Costs 2 Actions)","desc":"One creature charmed by the aboleth takes 10 (3d6) psychic damage, and the aboleth regains hit points equal to the damage the creature takes.","damage":[{"damage_type":{"index":"psychic","name":"Psychic","url":"/api/2014/damage-types/psychic"},"damage_dice":"3d6"}]}
      ],
      "image":"/api/images/monsters/aboleth.png",
      "url":"/api/2014/monsters/aboleth",
      "updated_at":"2025-10-24T20:42:13.741Z",
      "forms":[],
      "reactions":[]
    };

    const API_BASE = "https://www.dnd5eapi.co";

    // Helpers
    const el = (id) => document.getElementById(id);
    const mod = (score) => Math.floor((score - 10) / 2);
    const fmtMod = (m) => (m >= 0 ? `+${m}` : `${m}`);
    const listOrDash = (arr) => (arr && arr.length ? arr.join(", ") : "—");
    const safe = (v) => (v ?? "—");

    function render() {
      // Header
      el("monsterName").textContent = monster.name ?? "Monster";
      el("monsterTypeLine").textContent =
        `${safe(monster.size)} ${safe(monster.type)}, ${safe(monster.alignment)}`;

      // Pills
      const pills = [
        `Index: ${safe(monster.index)}`,
        `Tipo: ${safe(monster.type)}`,
        `Taglia: ${safe(monster.size)}`,
        `Allineamento: ${safe(monster.alignment)}`
      ];
      el("pillRow").innerHTML = pills.map(t => `<span class="pill">${t}</span>`).join("");

      // Meta
      el("cr").textContent = safe(monster.challenge_rating);
      el("xp").textContent = safe(monster.xp);
      el("pb").textContent = `+${safe(monster.proficiency_bonus)}`;
      el("updated").textContent = (monster.updated_at || "—").slice(0, 10);

      // Core stats
      const ac = (monster.armor_class || [])
        .map(x => `${x.value} (${x.type})`)
        .join(", ") || "—";
      el("ac").textContent = ac;

      el("hp").textContent = `${safe(monster.hit_points)} (roll: ${safe(monster.hit_points_roll)})`;
      el("hd").textContent = safe(monster.hit_dice);

      const speed = monster.speed
        ? Object.entries(monster.speed).map(([k,v]) => `${k}: ${v}`).join(" • ")
        : "—";
      el("speed").textContent = speed;

      // Senses / languages
      const senses = monster.senses
        ? Object.entries(monster.senses).map(([k,v]) => `${k}: ${v}`).join(" • ")
        : "—";
      el("senses").textContent = senses;
      el("languages").textContent = safe(monster.languages);
      el("alignment").textContent = safe(monster.alignment);

      // Inline tags (type/size)
      el("tagsInline").innerHTML = `
        <span class="tag">${safe(monster.size)}</span>
        <span class="tag">${safe(monster.type)}</span>
      `;

      // Ability scores
      const abilities = [
        ["STR", monster.strength],
        ["DEX", monster.dexterity],
        ["CON", monster.constitution],
        ["INT", monster.intelligence],
        ["WIS", monster.wisdom],
        ["CHA", monster.charisma],
      ];
      el("abilityGrid").innerHTML = abilities.map(([k, v]) => {
        const m = mod(Number(v));
        return `
          <div class="stat">
            <div class="k">${k}</div>
            <div class="v">${safe(v)}</div>
            <div class="m">${fmtMod(m)}</div>
          </div>
        `;
      }).join("");

      // Proficiencies
      const profs = (monster.proficiencies || []).map(p => {
        const name = p?.proficiency?.name ?? "Proficiency";
        const val = p?.value ?? "—";
        const url = p?.proficiency?.url ? API_BASE + p.proficiency.url : null;
        return url
          ? `<a class="tag" href="${url}" target="_blank" rel="noreferrer">${name} +${val}</a>`
          : `<span class="tag">${name} +${val}</span>`;
      });
      el("profs").innerHTML = profs.length ? profs.join("") : `<span class="muted">—</span>`;

      // Defenses
      el("vuln").textContent = listOrDash(monster.damage_vulnerabilities);
      el("res").textContent = listOrDash(monster.damage_resistances);
      el("imm").textContent = listOrDash(monster.damage_immunities);
      el("cimm").textContent = (monster.condition_immunities && monster.condition_immunities.length)
        ? monster.condition_immunities.map(c => c.name ?? c.index ?? String(c)).join(", ")
        : "—";

      // Specials
      el("specials").innerHTML = renderFeatureList(monster.special_abilities);

      // Actions
      el("actions").innerHTML = renderActionList(monster.actions);

      // Legendary
      el("legendary").innerHTML = renderFeatureList(monster.legendary_actions);

      // Image
      const imgUrl = monster.image ? API_BASE + monster.image : "";
      const img = el("monsterImg");
      img.src = imgUrl;
      img.alt = `${monster.name || "Monster"} image`;

      // JSON debug
      el("jsonBox").textContent = JSON.stringify(monster, null, 2);

      // Buttons
      el("copyJsonBtn").onclick = async () => {
        await navigator.clipboard.writeText(JSON.stringify(monster, null, 2));
        el("copyJsonBtn").textContent = "Copiato!";
        setTimeout(() => el("copyJsonBtn").textContent = "Copia JSON", 1200);
      };

      el("openApiBtn").onclick = () => {
        const url = monster.url ? API_BASE + monster.url : API_BASE;
        window.open(url, "_blank", "noopener,noreferrer");
      };
    }

    function renderFeatureList(list){
      if(!list || !list.length) return `<p class="muted">—</p>`;
      return list.map(item => {
        const dc = item.dc?.dc_value
          ? `DC ${item.dc.dc_value} ${item.dc.dc_type?.name || ""}`.trim()
          : null;
        const dmg = (item.damage && item.damage.length)
          ? item.damage.map(d => `${d.damage_dice} ${d.damage_type?.name || ""}`.trim()).join(", ")
          : null;

        return `
          <details>
            <summary>
              <span>${item.name ?? "Feature"}</span>
              <span class="muted">${[dc, dmg].filter(Boolean).join(" • ")}</span>
            </summary>
            <div class="desc">${(item.desc || "—").replaceAll("\\n","<br>")}</div>
          </details>
        `;
      }).join("");
    }

    function renderActionList(list){
      if(!list || !list.length) return `<p class="muted">—</p>`;
      return list.map(a => {
        const bonus = (a.attack_bonus !== undefined) ? `+${a.attack_bonus} to hit` : null;
        const dc = a.dc?.dc_value ? `DC ${a.dc.dc_value} ${a.dc.dc_type?.name || ""}`.trim() : null;

        const usage = a.usage?.times
          ? `${a.usage.times} ${a.usage.type}`
          : null;

        const dmg = (a.damage && a.damage.length)
          ? a.damage.map(d => `${d.damage_dice} ${d.damage_type?.name || ""}`.trim()).join(", ")
          : null;

        // Multiattack "actions" details
        const sub = (a.actions && a.actions.length)
          ? a.actions.map(x => `${x.count}× ${x.action_name} (${x.type})`).join(" • ")
          : null;

        const meta = [bonus, dc, usage, dmg, sub].filter(Boolean).join(" • ");

        return `
          <details>
            <summary>
              <span>${a.name ?? "Action"}</span>
              <span class="muted">${meta}</span>
            </summary>
            <div class="desc">${(a.desc || "—").replaceAll("\\n","<br>")}</div>
          </details>
        `;
      }).join("");
    }

    render();
  </script>
</body>
</html>
